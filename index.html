<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryton | Computadores Reacondicionados y Compra de Usados</title>
    <meta name="description" content="Ryton: computadores reacondicionados garantizados y compra de computadores usados. Pagos seguros, soporte técnico y entrega rápida." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/logo.jpeg">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="icons-sounds.js" defer></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="#/">
    <img src="/logo.jpeg" alt="Ryton" class="brand__img">

        </a>

        <nav class="nav" aria-label="Navegación principal">
          <a class="nav__link" href="#/">Inicio</a>
          <a class="nav__link" href="#/productos">Productos</a>
          <a class="nav__link" href="#/vender">Vender</a>
          <a class="nav__link" href="#/blog">Blog</a>
          <a class="nav__link" href="#/contacto">Contacto</a>
        </nav>

        <div class="topbar__actions">
          <a class="btn btn--ghost" href="#/cuenta" id="accountBtn">Cuenta</a>
          <a class="btn btn--primary" href="#/carrito" id="cartBtn">Carrito <span class="pill" id="cartCount">0</span></a>
          <button class="iconbtn" id="menuBtn" aria-label="Abrir menú">
            <span class="iconbtn__bar"></span>
            <span class="iconbtn__bar"></span>
            <span class="iconbtn__bar"></span>
          </button>
        </div>
      </div>

      <div class="mobilemenu" id="mobileMenu" hidden>
        <div class="container mobilemenu__inner">
          <a class="mobilemenu__link" href="#/">Inicio</a>
          <a class="mobilemenu__link" href="#/productos">Productos</a>
          <a class="mobilemenu__link" href="#/vender">Vender</a>
          <a class="mobilemenu__link" href="#/blog">Blog</a>
          <a class="mobilemenu__link" href="#/contacto">Contacto</a>
          <a class="mobilemenu__link" href="#/admin">Admin</a>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <div id="geo-notice" class="geo-notice" style="display:none;">
          <div class="geo-notice__inner">
            <div class="geo-notice__icon">🇨🇴</div>
            <div class="geo-notice__text">
              <strong>Ryton solo está disponible en Colombia.</strong><br>
              Si estás en Colombia, recarga la página o permite la ubicación en tu navegador.
            </div>
            <button class="geo-notice__close" onclick="closeGeoNotice()">×</button>
          </div>
        </div>

        <div id="app" class="app" aria-live="polite"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <div>
          <div class="footer__title">Ryton</div>
          <div class="footer__muted">Compra inteligente. Vende fácil. Soporte real.</div>
        </div>
        <div class="footer__links">
          <a href="#/productos">Catálogo</a>
          <a href="#/contacto">Soporte</a>
          <a href="#/admin">Admin</a>
        </div>
      </div>
    </footer>

    <div class="toastwrap" id="toastWrap" aria-live="assertive" aria-atomic="true"></div>
  </body>
</html>
